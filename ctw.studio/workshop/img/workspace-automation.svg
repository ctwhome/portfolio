<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-labelledby="title desc"><title id="title">Academic Automation</title><desc id="desc">notes → summary → actions → follow-up</desc><style>text{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.gridline{stroke:#171717;stroke-width:1}.arrow{animation:dash 4s linear infinite}.paper{animation:float 5s ease-in-out infinite}.p2{animation-delay:-1.4s}.bar{transform-origin:440px center;animation:grow 3.4s ease-in-out infinite}.b2{animation-delay:.4s}.b3{animation-delay:.8s}.slides{animation:float 5s ease-in-out infinite}.highlight{animation:blink 3s ease-in-out infinite}.h2{animation-delay:.8s}.note{animation:float 4.5s ease-in-out infinite}.n2{animation-delay:-1.2s}.pulse{animation:pulse 2.8s ease-in-out infinite;transform-origin:380px 190px}.chip{opacity:.75;animation:chip 5s ease-in-out infinite}.c1{animation-delay:.5s}.c2{animation-delay:1s}.c3{animation-delay:1.5s}@keyframes dash{to{stroke-dashoffset:-64}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}@keyframes grow{0%,100%{transform:scaleX(.45);opacity:.45}50%{transform:scaleX(1);opacity:.9}}@keyframes blink{0%,100%{opacity:.18}50%{opacity:.55}}@keyframes pulse{0%,100%{transform:scale(.92);opacity:.12}50%{transform:scale(1.18);opacity:.28}}@keyframes chip{0%,100%{opacity:.45}50%{opacity:1}}@media (prefers-reduced-motion:reduce){*{animation:none!important}}</style><rect width="800" height="600" rx="16" fill="#0a0a0a"/><defs><linearGradient id="glow" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f7b500" stop-opacity=".16"/><stop offset="1" stop-color="#f7b500" stop-opacity="0"/></linearGradient></defs><rect x="20" y="20" width="760" height="560" rx="12" fill="url(#glow)" stroke="#222" stroke-width="1.5"/><g opacity=".45"><line class="gridline" x1="80" y1="40" x2="80" y2="560"/><line class="gridline" x1="160" y1="40" x2="160" y2="560"/><line class="gridline" x1="240" y1="40" x2="240" y2="560"/><line class="gridline" x1="320" y1="40" x2="320" y2="560"/><line class="gridline" x1="400" y1="40" x2="400" y2="560"/><line class="gridline" x1="480" y1="40" x2="480" y2="560"/><line class="gridline" x1="560" y1="40" x2="560" y2="560"/><line class="gridline" x1="640" y1="40" x2="640" y2="560"/><line class="gridline" x1="720" y1="40" x2="720" y2="560"/><line class="gridline" x1="40" y1="80" x2="760" y2="80"/><line class="gridline" x1="40" y1="160" x2="760" y2="160"/><line class="gridline" x1="40" y1="240" x2="760" y2="240"/><line class="gridline" x1="40" y1="320" x2="760" y2="320"/><line class="gridline" x1="40" y1="400" x2="760" y2="400"/><line class="gridline" x1="40" y1="480" x2="760" y2="480"/><line class="gridline" x1="40" y1="560" x2="760" y2="560"/></g><text x="60" y="68" font-size="14" fill="#f7b500" letter-spacing="3">WORKFLOW</text><text x="60" y="98" font-size="26" font-weight="700" fill="#f2f1ec">Academic Automation</text><text x="60" y="128" font-size="14" fill="#9ca3af">notes → summary → actions → follow-up</text><g class="flow"><rect x="60" y="135" width="150" height="110" rx="16" fill="#111" stroke="#333"/><text x="135" y="184" text-anchor="middle" font-size="14" fill="#f2f1ec">Meeting notes</text><text x="135" y="210" text-anchor="middle" font-size="12" fill="#888">messy input</text><path class="arrow" d="M230 190 L330 190" stroke="#f7b500" stroke-width="3" stroke-dasharray="8 8"/><circle class="pulse" cx="380" cy="190" r="48" fill="#f7b500" opacity=".18"/><text x="380" y="196" text-anchor="middle" font-size="15" fill="#f7b500">AI step</text><path class="arrow" d="M435 190 L515 135 M435 190 L515 190 M435 190 L515 245" stroke="#f7b500" stroke-width="3" stroke-dasharray="8 8" fill="none"/><rect x="535" y="100" width="150" height="54" rx="14" fill="#151515" stroke="#333"/><text x="610" y="133" text-anchor="middle" font-size="13" fill="#f2f1ec">Action list</text><rect x="535" y="166" width="150" height="54" rx="14" fill="#151515" stroke="#333"/><text x="610" y="199" text-anchor="middle" font-size="13" fill="#f2f1ec">Email draft</text><rect x="535" y="232" width="150" height="54" rx="14" fill="#151515" stroke="#333"/><text x="610" y="265" text-anchor="middle" font-size="13" fill="#f2f1ec">Checklist</text></g><g class="chip c0"><rect x="70" y="420" width="190" height="34" rx="17" fill="#171717" stroke="#3a2b08"/><text x="165" y="442" text-anchor="middle" font-size="13" fill="#f7b500">Meetings</text></g><g class="chip c1"><rect x="310" y="420" width="190" height="34" rx="17" fill="#171717" stroke="#3a2b08"/><text x="405" y="442" text-anchor="middle" font-size="13" fill="#f7b500">Email</text></g><g class="chip c2"><rect x="70" y="478" width="190" height="34" rx="17" fill="#171717" stroke="#3a2b08"/><text x="165" y="500" text-anchor="middle" font-size="13" fill="#f7b500">Tasks</text></g><g class="chip c3"><rect x="310" y="478" width="190" height="34" rx="17" fill="#171717" stroke="#3a2b08"/><text x="405" y="500" text-anchor="middle" font-size="13" fill="#f7b500">Reports</text></g></svg>