<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-labelledby="title desc"><title id="title">Workflow Cards</title><desc id="desc">repeatable academic AI recipes</desc><style>text{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.row{animation:fade 5s ease-in-out infinite}.r1{animation-delay:.35s}.r2{animation-delay:.7s}.r3{animation-delay:1.05s}.r4{animation-delay:1.4s}@keyframes fade{0%,100%{opacity:.65;transform:translateX(0)}50%{opacity:1;transform:translateX(8px)}}@media (prefers-reduced-motion:reduce){*{animation:none!important}}</style><rect width="800" height="600" rx="16" fill="#0a0a0a"/><rect x="20" y="20" width="760" height="560" rx="12" fill="#0f0f0f" stroke="#222" stroke-width="1.5"/><rect x="52" y="52" width="696" height="496" rx="18" fill="#080808" stroke="#2c2209"/><text x="78" y="98" font-size="14" fill="#f7b500" letter-spacing="3">TAKE-HOME</text><text x="78" y="132" font-size="28" font-weight="700" fill="#f2f1ec">Workflow Cards</text><text x="78" y="158" font-size="14" fill="#9ca3af">repeatable academic AI recipes</text><g class="row r0"><rect x="78" y="170" width="644" height="36" rx="12" fill="#111" stroke="#2a2a2a"/><text x="100" y="193" font-size="13" fill="#f7b500">Paper</text><text x="330" y="193" font-size="13" fill="#d7d7d7">summary → concepts → claims</text></g><g class="row r1"><rect x="78" y="224" width="644" height="36" rx="12" fill="#111" stroke="#2a2a2a"/><text x="100" y="247" font-size="13" fill="#f7b500">Lecture</text><text x="330" y="247" font-size="13" fill="#d7d7d7">objectives → slides → activity</text></g><g class="row r2"><rect x="78" y="278" width="644" height="36" rx="12" fill="#111" stroke="#2a2a2a"/><text x="100" y="301" font-size="13" fill="#f7b500">Writing</text><text x="330" y="301" font-size="13" fill="#d7d7d7">feedback → revision plan</text></g><g class="row r3"><rect x="78" y="332" width="644" height="36" rx="12" fill="#111" stroke="#2a2a2a"/><text x="100" y="355" font-size="13" fill="#f7b500">Admin</text><text x="330" y="355" font-size="13" fill="#d7d7d7">notes → actions → email</text></g><rect x="78" y="492" width="644" height="18" rx="9" fill="#171717"/><rect class="progress" x="78" y="492" width="430" height="18" rx="9" fill="#f7b500" opacity=".55"><animate attributeName="width" values="120;560;430;120" dur="6s" repeatCount="indefinite"/></rect></svg>